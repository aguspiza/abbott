version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./prompts:/app/prompts
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --reload

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [api]
