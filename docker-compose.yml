services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./tickets.db:/app/tickets.db
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      args:
        # Must be reachable from the browser, not just within Docker
        VITE_API_URL: http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
